<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="background-grid"></div>

    <div class="login-container">

        <div class="logo-area">
            <h1>Life OS</h1>
            <p>Build your life like a "System"</p>
        </div>

        <div class="login-card">

            <h2>Sign In</h2>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button
                    type="button"
                    id="togglePassword"
                    class="btn-secondary"
                >
                    Show Password
                </button>

                <button type="submit" class="btn-primary">
                    Login
                </button>

            </form>

            <div class="actions">

                <button
                    class="btn-secondary"
                    id="registerBtn"
                >
                    Register
                </button>

                <button
                    class="btn-secondary"
                    id="forgotBtn"
                >
                    Forgot Password ?
                </button>

            </div>

        </div>

    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
